<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Color Generator</title>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>
<body>
    <div class="container">
        <h1>Color Generator</h1>
        <div class="content">
            <div class="division cards">
                <div class="card 1">
                    <div class="color one" id="card1"></div>
                    <div class="name">
                        <p class="hexcode1" id="hexcode1">#3D5B81</p>
                        <div class="tooltip">
                            <ion-icon name="copy-outline" class="icon"></ion-icon>
                            <span class="tooltipText">Copy</span>
                        </div>
                    </div>
                </div>
                <div class="card 2">
                    <div class="color two" id="card2"></div>
                    <div class="name">
                        <p class="hexcode2" id="hexcode2">#99C1DA</p>
                        <div class="tooltip">
                            <button id="copyButton" class="buttonCopy" onclick="copyCode()">
                                <ion-icon name="copy-outline" class="icon"></ion-icon>
                            </button>
                            <span class="tooltipText">Copy</span>
                        </div>
                    </div>
                </div>
                <div class="card 3">
                    <div class="color three" id="card3"></div>
                    <div class="name">
                        <p class="hexcode3" id="hexcode3">#DFFBFC</p>
                        <div class="tooltip">
                            <button class="buttonCopy" onclick="copyCode()">
                                <ion-icon name="copy-outline" class="icon"></ion-icon>
                            </button>
                            <span class="tooltipText">Copy</span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="division cards">
                <div class="card 4">
                    <div class="color four" id="card4"></div>
                    <div class="name">
                        <p class="hexcode4" id="hexcode4">#EE6B4D</p>
                        <div class="tooltip">
                            <button class="buttonCopy" onclick="copyCode()">
                                <ion-icon name="copy-outline" class="icon"></ion-icon>
                            </button>
                            <span class="tooltipText">Copy</span>
                        </div>
                    </div>
                </div>
                <div class="card 5">
                    <div class="color five" id="card5"></div>
                    <div class="name">
                        <p class="hexcode5" id="hexcode5">#293241</p>
                        <div class="tooltip">
                            <button class="buttonCopy" onclick="copyCode()">
                                <ion-icon name="copy-outline" class="icon"></ion-icon>
                            </button>
                            <span class="tooltipText">Copy</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <button type="button" class="button" onclick="generatePallete()">Generate Pallette</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
