<!DOCTYPE html>
<html lang="en">
<head>

    <title>Color Generator</title>

            </div>
            <div class="card 2">
                <div class="color two"></div>
                <div class="name">
                    <p class="hexcode"></p>

                </div>
            </div>
            <div class="card 3">
                <div class="color three"></div>
                <div class="name">
                    <p class="hexcode"></p>
                    <ion-icon name="copy-outline"></ion-icon>
                </div>
            </div>
            <div class="card 4">
                <div class="color four"></div>
                <div class="name">
                    <p class="hexcode"></p>
                    <ion-icon name="copy-outline"></ion-icon>
                </div>
            </div>
            <div class="card 5">
                <div class="color five"></div>
                <div class="name">
                    <p class="hexcode">#AF3A34</p>

        <a href="">Generate Pallette</a>
